sonar.projectKey=openclaw
sonar.projectName=OpenClaw
sonar.projectVersion=2026.1.30
sonar.sourceEncoding=UTF-8

# Source directories
sonar.sources=src,apps,packages

# Test directories
sonar.tests=src,apps,packages,test

# Exclusions for sources
sonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/*.test.ts,**/*.spec.ts,**/coverage/**,**/docs/**,**/scripts/**,**/test/**,**/ui/**,**/assets/**

# Exclusions for tests (to avoid duplication with sources if overlap exists, though sonar usually handles it)
sonar.test.inclusions=**/*.test.ts,**/*.spec.ts

# TypeScript specific
sonar.typescript.lcov.reportPaths=coverage/lcov.info
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Ignore duplication in these
sonar.cpd.exclusions=**/*.test.ts,**/*.spec.ts

# Analysis scope suggestions
# Adjust these based on your specific needs
